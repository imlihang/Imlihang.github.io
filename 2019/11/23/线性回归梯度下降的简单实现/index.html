pan> count = <span class="number">0</span>; <span class="comment">//当前循环次数</span></span><br><span class="line"></span><br><span class="line">        <span class="keyword">int</span> loop = <span class="number">1000</span>; <span class="comment">//最大循环次数</span></span><br><span class="line">        <span class="keyword">double</span> loss = <span class="number">0</span>; <span class="comment">// 损失值</span></span><br><span class="line">        <span class="keyword">double</span> alpha = <span class="number">0.01</span>; <span class="comment">//学习率</span></span><br><span class="line">        <span class="keyword">while</span> (count&lt;loop)&#123;</span><br><span class="line"></span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> i =<span class="number">0</span>;i&lt;m;i++)&#123;</span><br><span class="line">                <span class="comment">//梯度求解</span></span><br><span class="line">                <span class="keyword">double</span> diff = a *x1[i] + b*x2[i] + c - y[i];</span><br><span class="line">                <span class="comment">//参数更新</span></span><br><span class="line">                a -= alpha *diff * x1[i];</span><br><span class="line">                b -= alpha *diff * x2[i];</span><br><span class="line">                c -= alpha *diff;</span><br><span class="line">            &#125;</span><br><span class="line">            count++;</span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> i =<span class="number">0</span>;i&lt;m;i++)&#123;</span><br><span class="line">                <span class="comment">//System.out.println(a*x1[i]+b*x2[i]+c);</span></span><br><span class="line">                loss += (y[i]-(a*x1[i]+b*x2[i]+c))</span><br><span class="line">                        *(y[i]-(a*x1[i]+b*x2[i]+c));</span><br><span class="line">            &#125;</span><br><span class="line">            loss = loss / m;</span><br><span class="line"> ss="line"></span><br><span class="line">        <span class="keyword">int</span> loop = <span class="number">1000</span>; <span class="comment">//最大循环次数</span></span><br><span class="line">        <span class="keyword">double</span> loss = <span class="number">0</span>.; <span class="comment">// 损失值</span></span><br><span class="line">        <span class="keyword">double</span> alpha = <span class="number">0.01</span>; <span class="comment">//学习率</span></span><br><span class="line">        <span class="keyword">while</span> (count&lt;loop)&#123;</span><br><span class="line">            <span class="keyword">double</span> diffx1 = <span class="number">0</span>;</span><br><span class="line">            <span class="keyword">double</span> diff = <span class="number">0</span>;</span><br><span class="line">            <span class="keyword">double</span> diffx2 = <span class="number">0</span>;</span><br><span class="line">            <span class="comment">//梯度求解</span></span><br><span class="line">            <span class="keyword">for</span> (<span class="keyword">int</span> j = <span class="number">0</span>; j &lt; m; j++) &#123;</span><br><span class="line">                diff += a * x1[j] + b * x2[j] + c - y[j];</span><br><span class="line">                diffx1 += (a * x1[j] + b * x2[j] + c - y[j])*x1[j];</span><br><span class="line">                diffx2 += (a * x1[j] + b * x2[j] + c - y[j])*x2[j];</span><br><span class="line">            &#125;</span><br><span class="line"></span><br><span class="line">            <span class="comment">//参数更新</span></span><br><span class="line">            a -= alpha * diffx1 / m;</span><br><span class="line">            b -= alpha * diffx2 / m;</span><br><span class="line">            c -= alpha * diff /m;</span><br><span class="line"></span><br><span class="line">            count++;</span><br><span class="line"></span><br><span class="line">            <span class="comment">//损失值打印</span></span><br><span class="line">
